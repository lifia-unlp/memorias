services:
  memorias-copilot:
    image: cientopolis/memorias-copilot:latest
    container_name: memorias-copilot
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - MEMORIAS_WEB_BASE_URL=${MEMORIAS_WEB_BASE_URL:-http://localhost:3000}
      - SESSION_TIMEOUT_SECONDS=${SESSION_TIMEOUT_SECONDS:-3600}
    volumes:
      - copilot-logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - proxy-network
      - db-network

volumes:
  copilot-logs:

networks:
  proxy-network:
    external: true
  db-network:
    external: true
