name: Publish to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'memorias-web/**'
      - '.github/workflows/publish-docker.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: actions/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./memorias-web
          file: ./memorias-web/Dockerfile
          # Builds for standard 64-bit servers. You can add linux/arm64 if needed.
          platforms: linux/amd64
          push: true
          tags: |
            cientopolis/new-memorias:latest
            cientopolis/new-memorias:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
